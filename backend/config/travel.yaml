# travel.yaml - Aerus RPG travel and encounter system
# Extracted from the canonical world and regional maps.
# Unit: travel days (baseline = an adult carrying standard gear)

speed:
  road: 1.0
  trail: 1.5
  wilderness: 2.0
  sea: 0.6
  mountain: 3.0
  arctic: 3.5
  corrupted: 2.5

encounter_chance:
  road: 0.15
  trail: 0.30
  wilderness: 0.40
  sea: 0.20
  mountain: 0.35
  arctic: 0.30
  corrupted: 0.60

encounter_tables:
  road:
    - { roll_min: 1, roll_max: 8, type: "bandits", tier: 1, description: "Bandits or imperial deserters on the road" }
    - { roll_min: 9, roll_max: 14, type: "merchants", tier: 0, description: "Friendly or neutral caravan with possible information" }
    - { roll_min: 15, roll_max: 17, type: "creature_t1", tier: 1, description: "A Tier 1 creature emerges from the woods onto the road" }
    - { roll_min: 18, roll_max: 20, type: "narrative_event", tier: 0, description: "Traveling noble, imperial guard, or urgent messenger" }
  trail:
    - { roll_min: 1, roll_max: 6, type: "creature_t1", tier: 1, description: "Thorn-Grays or a Goblin Surge ambush" }
    - { roll_min: 7, roll_max: 12, type: "shadow_turner", tier: 1, description: "A Shadow-Turner or Keth beast stalks the trail" }
    - { roll_min: 13, roll_max: 16, type: "creature_t2", tier: 2, description: "Dimensional predator or Herald of Rot" }
    - { roll_min: 17, roll_max: 18, type: "ruins_discovery", tier: 0, description: "Small ruin with an item or lore fragment" }
    - { roll_min: 19, roll_max: 20, type: "surprise_ally", tier: 0, description: "An allied NPC or survivor needs help" }
  wilderness:
    - { roll_min: 1, roll_max: 5, type: "creature_t1", tier: 1, description: "Tier 1 creature ambush" }
    - { roll_min: 6, roll_max: 11, type: "creature_t2", tier: 2, description: "Tier 2 creature in untamed territory" }
    - { roll_min: 12, roll_max: 14, type: "magic_surge", tier: 0, description: "Thread Surge causing a random corruption effect" }
    - { roll_min: 15, roll_max: 17, type: "camp", tier: 0, description: "Mercenary or refugee camp" }
    - { roll_min: 18, roll_max: 20, type: "natural_phenomenon", tier: 0, description: "Storm, ravine, or unstable terrain" }
  sea:
    - { roll_min: 1, roll_max: 6, type: "lesser_leviathan", tier: 2, description: "Sea monster such as a lesser leviathan or sea serpent" }
    - { roll_min: 7, roll_max: 11, type: "pirates", tier: 1, description: "Pirate ship or island corsairs" }
    - { roll_min: 12, roll_max: 15, type: "storm", tier: 0, description: "Storm damages the ship and may push it off course" }
    - { roll_min: 16, roll_max: 18, type: "ghost_ship", tier: 2, description: "Hungry specter or drifting corrupted vessel" }
    - { roll_min: 19, roll_max: 20, type: "unknown_island", tier: 0, description: "Unmapped island hiding lore or treasure" }
  mountain:
    - { roll_min: 1, roll_max: 5, type: "keth_beast", tier: 1, description: "Keth beast from the ice and stone" }
    - { roll_min: 6, roll_max: 10, type: "avalanche", tier: 0, description: "Avalanche with damage and possible party separation" }
    - { roll_min: 11, roll_max: 14, type: "creature_t2", tier: 2, description: "Forged orc or mountain predator" }
    - { roll_min: 15, roll_max: 17, type: "forgers", tier: 0, description: "Forger patrol, neutral or hostile depending on context" }
    - { roll_min: 18, roll_max: 20, type: "keth_vein", tier: 0, description: "Exposed Keth vein with stable magic nearby" }
  arctic:
    - { roll_min: 1, roll_max: 7, type: "bestia_keth", tier: 2, description: "Deep-ice Keth beast or cave hunter" }
    - { roll_min: 8, roll_max: 12, type: "ice_storm", tier: 0, description: "Blizzard with near-zero visibility and hypothermia risk" }
    - { roll_min: 13, roll_max: 15, type: "creature_t2", tier: 2, description: "Tier 2 arctic creature" }
    - { roll_min: 16, roll_max: 18, type: "keth_outpost", tier: 0, description: "Advanced Forger outpost with possible shelter" }
    - { roll_min: 19, roll_max: 20, type: "thread_anomaly", tier: 0, description: "A place where the Thread sleeps inside stone and magic stabilizes" }
  corrupted:
    - { roll_min: 1, roll_max: 4, type: "ash_golem", tier: 2, description: "Ash Golem or Herald of Rot" }
    - { roll_min: 5, roll_max: 8, type: "corruption_surge", tier: 0, description: "Corruption surge distorts active magic" }
    - { roll_min: 9, roll_max: 12, type: "creature_t3", tier: 3, description: "Tier 3 threat such as an Ash Dragon or Corrupted Angel" }
    - { roll_min: 13, roll_max: 15, type: "echo_of_vorathek", tier: 3, description: "Non-sentient manifestation of Vor'Athek" }
    - { roll_min: 16, roll_max: 18, type: "aeridian_ruins", tier: 0, description: "Deep Aeridian ruins with lore and possible fragments" }
    - { roll_min: 19, roll_max: 20, type: "abyss_lord", tier: 4, description: "Abyss Lord encounter where escape is wiser than combat" }

