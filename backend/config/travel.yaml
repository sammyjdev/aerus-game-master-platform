routes:
  port_myr->vel_ossian:
    segments:
      - { terrain: sea, days: 1, label: "Port Myr -> Vel'Ossian (inter-island ship)" }
    total_days: 1
    notes: "Daily trade route with regular boats."
  port_myr->sanctum:
    segments:
      - { terrain: sea, days: 2, label: "Port Myr -> Sanctum (eastern crossing)" }
    total_days: 2
  vel_ossian->sanctum:
    segments:
      - { terrain: sea, days: 2, label: "Vel'Ossian -> Sanctum" }
    total_days: 2
  port_myr->auramveld:
    segments:
      - { terrain: sea, days: 4, label: "Port Myr -> eastern Valdoria coast" }
      - { terrain: road, days: 3, label: "Coast -> Auramveld (imperial road)" }
    total_days: 7
    notes: "Main Isles-to-Empire route."
  port_myr->calmveth:
    segments:
      - { terrain: sea, days: 3, label: "Port Myr -> Calmveth" }
    total_days: 3
    notes: "Fastest direct route to western Valdoria."
  port_myr->osthara:
    segments:
      - { terrain: sea, days: 4, label: "Port Myr -> Valdoria coast" }
      - { terrain: road, days: 2, label: "Coast -> Osthara" }
    total_days: 6
  port_myr->marchado_ferren:
    segments:
      - { terrain: sea, days: 4, label: "Port Myr -> southeastern Valdoria coast" }
      - { terrain: wilderness, days: 4, label: "Coast -> Ferren March" }
    total_days: 8
    notes: "Imperial patrols are common."
  port_myr->vel_shar:
    segments:
      - { terrain: sea, days: 5, label: "Port Myr -> western Shaleth coast" }
      - { terrain: trail, days: 3, label: "Coast -> Vel-Shar" }
    total_days: 8
  port_myr->vel_arath:
    segments:
      - { terrain: sea, days: 5, label: "Port Myr -> Shaleth coast" }
      - { terrain: trail, days: 6, label: "Coast -> depths of Vel'Arath" }
    total_days: 11
    notes: "Vel'Arath does not maintain a fixed route."
  port_myr->stenvaard:
    segments:
      - { terrain: sea, days: 7, label: "Port Myr -> Stenvaard (northern sea)" }
    total_days: 7
  port_myr->kethara:
    segments:
      - { terrain: sea, days: 7, label: "Port Myr -> southern Estravar coast" }
      - { terrain: mountain, days: 5, label: "Coast -> Kethara" }
    total_days: 12
  port_myr->passagem_ondrek:
    segments:
      - { terrain: sea, days: 7, label: "Port Myr -> Stenvaard" }
      - { terrain: mountain, days: 5, label: "Stenvaard -> Ondrek Pass" }
    total_days: 12
  port_myr->khor_ath:
    segments:
      - { terrain: sea, days: 6, label: "Port Myr -> southern Khorrath coast" }
      - { terrain: wilderness, days: 2, label: "Coast -> Khor-Ath" }
    total_days: 8
  port_myr->coracao_cinzas:
    segments:
      - { terrain: sea, days: 6, label: "Port Myr -> Khorrath coast" }
      - { terrain: wilderness, days: 3, label: "Coast -> Khor-Ath" }
      - { terrain: corrupted, days: 4, label: "Khor-Ath -> Heart of Ashes" }
    total_days: 13
    notes: "Extremely dangerous. Not recommended below level 100."
  port_myr->veth_ara:
    segments:
      - { terrain: sea, days: 10, label: "Port Myr -> Veth" }
    total_days: 10
    notes: "Rare route known by very few navigators."
  auramveld->osthara:
    segments:
      - { terrain: road, days: 2 }
    total_days: 2
  auramveld->calmveth:
    segments:
      - { terrain: road, days: 2, label: "Auramveld -> Osthara" }
      - { terrain: trail, days: 2, label: "Osthara -> Calmveth" }
    total_days: 4
  auramveld->marchado_ferren:
    segments:
      - { terrain: road, days: 3 }
    total_days: 3
  auramveld->fendas_de_gorath:
    segments:
      - { terrain: road, days: 2, label: "Auramveld -> northeastern edge" }
      - { terrain: corrupted, days: 1, label: "Entrance to the rifts" }
    total_days: 3
    notes: "Temporal anomalies may distort perceived travel time."
  osthara->calmveth:
    segments:
      - { terrain: trail, days: 2 }
    total_days: 2
  calmveth->marchado_ferren:
    segments:
      - { terrain: wilderness, days: 4 }
    total_days: 4
  auramveld->stenvaard:
    segments:
      - { terrain: road, days: 3, label: "Auramveld -> northern Valdoria" }
      - { terrain: mountain, days: 4, label: "Border -> Ondrek Pass entrance" }
      - { terrain: mountain, days: 3, label: "Pass -> Estravar exit" }
      - { terrain: mountain, days: 2, label: "Exit -> Stenvaard" }
    total_days: 12
  auramveld->kethara:
    segments:
      - { terrain: road, days: 3, label: "Auramveld -> north" }
      - { terrain: mountain, days: 7, label: "Ondrek Pass -> Kethara" }
    total_days: 10
  vel_shar->vel_arath:
    segments:
      - { terrain: trail, days: 4 }
    total_days: 4
    notes: "The forest only admits those it chooses."
  vel_arath->limen_vel_arath:
    segments:
      - { terrain: trail, days: 2, label: "Interior -> forbidden edge" }
      - { terrain: corrupted, days: 1, label: "Edge -> Ultra Hic Nemo Redit" }
    total_days: 3
  stenvaard->kethara:
    segments:
      - { terrain: mountain, days: 4 }
    total_days: 4
  kethara->keth_ara:
    segments:
      - { terrain: arctic, days: 5 }
    total_days: 5
  keth_ara->passagem_ondrek:
    segments:
      - { terrain: mountain, days: 3 }
    total_days: 3
  stenvaard->passagem_ondrek:
    segments:
      - { terrain: mountain, days: 5 }
    total_days: 5
  khor_ath->urbes_ambulantes:
    segments:
      - { terrain: wilderness, days: 3, label: "Desert -> wandering caravans" }
    total_days: 3
    notes: "Caravan-city positions may shift by two days."
  khor_ath->coracao_cinzas:
    segments:
      - { terrain: wilderness, days: 3, label: "Khor-Ath -> ash desert edge" }
      - { terrain: corrupted, days: 4, label: "Ash Desert -> Heart" }
    total_days: 7
  khor_ath->ordo_cineris:
    segments:
      - { terrain: wilderness, days: 2, label: "Khor-Ath -> eastern edge" }
      - { terrain: corrupted, days: 2, label: "Edge -> Ordo Cineris" }
    total_days: 4
  ordo_cineris->coracao_cinzas:
    segments:
      - { terrain: corrupted, days: 3 }
    total_days: 3
    notes: "Only the order knows the safest route."
  urbes_ambulantes->coracao_cinzas:
    segments:
      - { terrain: wilderness, days: 2 }
      - { terrain: corrupted, days: 3 }
    total_days: 5
  veth_ara->terra_incognita:
    segments:
      - { terrain: trail, days: 4, label: "Coast -> interior edge" }
      - { terrain: corrupted, days: 2, label: "Edge -> forbidden land" }
    total_days: 6
    notes: "Even the Vethani fear what lies deeper inside."
