<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Sky -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#02030d"/>
      <stop offset="55%"  stop-color="#080920"/>
      <stop offset="100%" stop-color="#12102a"/>
    </linearGradient>
    <!-- Ground mist -->
    <linearGradient id="mist" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0e1228" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#0e1228" stop-opacity="0.55"/>
    </linearGradient>
    <!-- Magical glow (center ruins) -->
    <radialGradient id="ruinGlow" cx="50%" cy="62%" r="28%">
      <stop offset="0%"   stop-color="#3a2080" stop-opacity="0.28"/>
      <stop offset="50%"  stop-color="#1a0f40" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- Ground gradient -->
    <linearGradient id="gnd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0c0e14"/>
      <stop offset="100%" stop-color="#050507"/>
    </linearGradient>
    <!-- Vignette -->
    <radialGradient id="vig" cx="50%" cy="45%" r="70%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.88"/>
    </radialGradient>
    <!-- Left/right fade -->
    <linearGradient id="lr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0.70"/>
      <stop offset="15%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="85%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.70"/>
    </linearGradient>
    <!-- Tree dark gradient -->
    <linearGradient id="tree" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0d110a"/>
      <stop offset="100%" stop-color="#040504"/>
    </linearGradient>
  </defs>

