<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">Aerus Frontend Hybrid Architecture</title>
  <desc id="desc">Hybrid frontend architecture with pages, feature entry points, components, and shared layers.</desc>
  <style>
    .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
    .label { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
    .small { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #334155; }
    .box { rx: 14; ry: 14; }
  </style>

  <rect x="0" y="0" width="1100" height="520" fill="#f8fafc"/>
  <text x="40" y="48" class="title">Frontend - Hybrid Organization</text>

  <rect class="box" x="40" y="90" width="310" height="160" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="64" y="126" class="label">Pages</text>
  <text x="64" y="154" class="small">src/pages/GamePage.tsx</text>
  <text x="64" y="178" class="small">src/pages/LoginPage.tsx</text>
  <text x="64" y="202" class="small">src/pages/CharacterCreationPage.tsx</text>

  <rect class="box" x="395" y="90" width="310" height="160" fill="#dcfce7" stroke="#4ade80"/>
  <text x="419" y="126" class="label">Features (Entrypoints)</text>
  <text x="419" y="154" class="small">src/features/game/index.ts</text>
  <text x="419" y="178" class="small">aggregates exports by domain</text>
  <text x="419" y="202" class="small">reduces import coupling</text>

  <rect class="box" x="750" y="90" width="310" height="160" fill="#fef9c3" stroke="#facc15"/>
  <text x="774" y="126" class="label">Components by Domain</text>
  <text x="774" y="154" class="small">character/* · combat/* · narrative/*</text>
  <text x="774" y="178" class="small">screens/* · ui/*</text>

  <rect class="box" x="40" y="290" width="1020" height="180" fill="#fee2e2" stroke="#f87171"/>
  <text x="64" y="326" class="label">Shared Layers</text>
  <text x="64" y="354" class="small">src/store (Zustand) · src/hooks · src/api · src/types · src/constants</text>
  <text x="64" y="380" class="small">All pages and features depend on these cross-cutting layers.</text>
  <text x="64" y="406" class="small">Strategy: keep the layers simple and evolve features only where the domain grows.</text>

  <path d="M350 170 L392 170" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M705 170 L747 170" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M550 250 L550 286" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#334155"/>
    </marker>
  </defs>
</svg>
