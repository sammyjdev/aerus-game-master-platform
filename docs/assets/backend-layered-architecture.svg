<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">Aerus Backend Layered Architecture</title>
  <desc id="desc">Layered backend architecture with API, application, domain, and infrastructure.</desc>
  <style>
    .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
    .label { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
    .small { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #334155; }
    .box { rx: 14; ry: 14; }
  </style>

  <rect x="0" y="0" width="1100" height="520" fill="#f8fafc"/>
  <text x="40" y="48" class="title">Backend - Layered Architecture</text>

  <rect class="box" x="40" y="80" width="1020" height="90" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="64" y="118" class="label">API Layer (FastAPI)</text>
  <text x="64" y="146" class="small">src/main.py · auth endpoints · websocket endpoints</text>

  <rect class="box" x="40" y="190" width="1020" height="90" fill="#dcfce7" stroke="#4ade80"/>
  <text x="64" y="228" class="label">Application Layer</text>
  <text x="64" y="256" class="small">src/application/* · orchestration rules · use cases (billing, game flow)</text>

  <rect class="box" x="40" y="300" width="1020" height="90" fill="#fef9c3" stroke="#facc15"/>
  <text x="64" y="338" class="label">Domain / Core</text>
  <text x="64" y="366" class="small">src/game_master.py · src/context_builder.py · models.py · business invariants</text>

  <rect class="box" x="40" y="410" width="1020" height="90" fill="#fee2e2" stroke="#f87171"/>
  <text x="64" y="448" class="label">Infrastructure Layer</text>
  <text x="64" y="476" class="small">src/infrastructure/config · state_manager(SQLite) · vector_store(ChromaDB) · local_llm(OpenRouter/Ollama)</text>

  <path d="M990 170 L990 188" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M990 280 L990 298" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M990 390 L990 408" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#334155"/>
    </marker>
  </defs>
</svg>
